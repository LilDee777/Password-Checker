<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>VaultGuard | Password Strength Checker</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#515f78",
                        "on-secondary-fixed": "#181445",
                        "surface-container": "#1f1f21",
                        "primary": "#b9c7e4",
                        "inverse-surface": "#e4e2e4",
                        "secondary": "#c4c1fb",
                        "on-tertiary-fixed-variant": "#5d4124",
                        "surface-container-low": "#1b1b1d",
                        "surface-dim": "#131315",
                        "background": "#131315",
                        "surface-bright": "#39393b",
                        "on-surface": "#e4e2e4",
                        "on-secondary-fixed-variant": "#444173",
                        "on-tertiary-container": "#9d7b5a",
                        "on-surface-variant": "#c5c6cd",
                        "on-primary-fixed-variant": "#39475f",
                        "surface-container-highest": "#343536",
                        "on-error": "#690005",
                        "on-background": "#e4e2e4",
                        "on-tertiary-fixed": "#2b1701",
                        "surface-container-high": "#2a2a2c",
                        "secondary-fixed-dim": "#c4c1fb",
                        "tertiary-fixed": "#ffdcbd",
                        "primary-fixed-dim": "#b9c7e4",
                        "outline": "#8f9097",
                        "on-secondary-container": "#b3afe9",
                        "on-primary": "#233148",
                        "tertiary-fixed-dim": "#e7bf99",
                        "error": "#ffb4ab",
                        "on-primary-fixed": "#0d1c32",
                        "on-secondary": "#2d2a5b",
                        "tertiary": "#e7bf99",
                        "inverse-on-surface": "#303032",
                        "secondary-fixed": "#e3dfff",
                        "secondary-container": "#444173",
                        "on-error-container": "#ffdad6",
                        "surface-variant": "#343536",
                        "on-tertiary": "#432b10",
                        "error-container": "#93000a",
                        "surface": "#131315",
                        "tertiary-container": "#281400",
                        "on-primary-container": "#74829d",
                        "surface-tint": "#b9c7e4",
                        "outline-variant": "#44474d",
                        "primary-fixed": "#d6e3ff",
                        "primary-container": "#0a192f",
                        "surface-container-lowest": "#0e0e10"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "8px",
                        "lg": "40px",
                        "md": "24px",
                        "base": "4px",
                        "container-max": "1200px",
                        "gutter": "24px",
                        "sm": "16px",
                        "xl": "64px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "mono-code": ["Geist"],
                        "headline-md": ["Inter"],
                        "label-md": ["Geist"],
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["26px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "mono-code": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="font-body-md overflow-x-hidden">

    <header class="fixed top-0 w-full bg-surface/10 backdrop-blur-md border-b border-white/10 z-50">
        <nav class="flex justify-between items-center h-16 px-md w-full max-w-container-max mx-auto">
            <div class="flex items-center gap-xs">
                <span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
                <span class="font-headline-md text-headline-md font-bold text-on-surface">VaultGuard</span>
            </div>
            <div class="hidden md:flex gap-xl">
                <a class="text-primary font-bold border-b-2 border-primary pb-1 font-body-md text-body-md" href="#">Passwords</a>
            </div>
            <button class="bg-primary text-on-primary px-sm py-xs rounded-lg font-label-md text-label-md transition-transform active:scale-95 hover:bg-white/90">
                Sign In
            </button>
        </nav>
    </header>

    <main class="relative min-h-screen flex items-center justify-center pt-20 px-sm sm:px-md overflow-hidden">
        <div class="absolute top-1/4 left-1/4 w-72 h-72 sm:w-96 sm:h-96 bg-primary/10 blur-[120px] rounded-full pointer-events-none"></div>
        <div class="absolute bottom-1/4 right-1/4 w-72 h-72 sm:w-96 sm:h-96 bg-secondary/10 blur-[120px] rounded-full pointer-events-none"></div>
        
        <section class="w-full max-w-[min(92vw,42rem)] text-center z-10 px-sm sm:px-0">
            <h1 class="font-headline-lg text-headline-lg sm:text-[32px] sm:leading-[40px] md:text-[48px] md:leading-[56px] text-on-surface mb-md">
                Strengthen Your Passwords with Vault Guard
            </h1>
            <p class="font-body-lg text-body-lg text-on-surface-variant mb-xl max-w-lg mx-auto text-center sm:text-left">
                Put your passwords to the test with my advanced checker.
            </p>
            
            <div class="glass-panel p-sm sm:p-md md:p-xl rounded-xl text-left">
                <label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="password-input">Enter Password</label>
                <div class="relative group">
                    <input class="w-full bg-surface-container-lowest border-0 border-b-2 border-white/10 text-on-surface p-md text-headline-md font-mono-code focus:ring-0 focus:border-primary transition-all rounded-t-lg placeholder:text-outline-variant" id="password-input" placeholder="••••••••••••" type="password">
                    <button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" id="toggle-password">
                        <span class="material-symbols-outlined" id="visibility-icon">visibility</span>
                    </button>
                </div>
                
                <div class="mt-md">
                    <div class="flex justify-between items-center mb-xs">
                        <span class="font-label-md text-label-md text-on-surface-variant">Security Health</span>
                        <span class="font-label-md text-label-md text-outline-variant" id="strength-label">Enter a password...</span>
                    </div>
                    <div class="h-1.5 w-full bg-white/5 rounded-full flex gap-xs">
                        <div class="strength-bar-segment h-full w-1/3 rounded-full bg-white/10" id="bar-1"></div>
                        <div class="strength-bar-segment h-full w-1/3 rounded-full bg-white/10" id="bar-2"></div>
                        <div class="strength-bar-segment h-full w-1/3 rounded-full bg-white/10" id="bar-3"></div>
                    </div>
                </div>
                
                <div class="mt-xl grid grid-cols-1 md:grid-cols-2 gap-md text-on-surface-variant font-label-md text-label-md">
                    <div class="flex items-center gap-xs">
                        <span class="material-symbols-outlined text-[20px]" id="rule-length">circle</span>
                        8+ Characters
                    </div>
                    <div class="flex items-center gap-xs">
                        <span class="material-symbols-outlined text-[20px]" id="rule-upper">circle</span>
                        Uppercase &amp; Lowercase
                    </div>
                    <div class="flex items-center gap-xs">
                        <span class="material-symbols-outlined text-[20px]" id="rule-number">circle</span>
                        Numbers Included
                    </div>
                    <div class="flex items-center gap-xs">
                        <span class="material-symbols-outlined text-[20px]" id="rule-special">circle</span>
                        Special Symbols
                    </div>
                </div>

                <div class="mt-xl grid gap-md text-on-surface-variant font-label-md text-label-md">
                    <div class="grid gap-2 sm:grid-cols-2 sm:items-end">
                        <label class="block" for="length-select">Password length</label>
                        <select id="length-select" class="w-full bg-surface-container-lowest border border-white/10 rounded-lg p-3 text-on-surface focus:border-primary focus:outline-none">
                            <option value="8">8 characters</option>
                            <option value="10">10 characters</option>
                            <option value="16">16 characters</option>
                        </select>
                    </div>

                    <div class="grid gap-2">
                        <span>Character options</span>
                        <div class="flex flex-col gap-2 sm:flex-row sm:items-center">
                            <label class="inline-flex items-center gap-2">
                                <input type="radio" name="charset" value="alnum" checked class="h-4 w-4 text-primary ring-1 ring-white/20 focus:ring-primary">
                                Letters &amp; numbers
                            </label>
                            <label class="inline-flex items-center gap-2">
                                <input type="radio" name="charset" value="symbols" class="h-4 w-4 text-primary ring-1 ring-white/20 focus:ring-primary">
                                Letters, numbers &amp; symbols
                            </label>
                        </div>
                    </div>

                    <button id="generate-password" class="mt-4 w-full bg-primary text-on-primary px-4 py-3 rounded-lg font-label-md text-label-md transition-transform active:scale-95 hover:bg-white/90">
                        Generate Password
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
